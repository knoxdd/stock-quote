<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>四檔美股收盤價追蹤</title>
  <style>
    :root {
      --bg: #f6f7f9;
      --panel: #fff;
      --text: #1f2937;
      --muted: #667085;
      --line: #d8dee4;
      --accent: #2563eb;
      --buy: #b45309;
      --good: #087443;
      --bad: #b42318;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif;
      padding: 16px;
    }

    main {
      width: min(1180px, 100%);
      margin: 0 auto;
      display: grid;
      gap: 12px;
    }

    header {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: end;
      flex-wrap: wrap;
    }

    h1 {
      margin: 0;
      font-size: 24px;
      letter-spacing: 0;
    }

    .sub, .status {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    label {
      color: var(--muted);
      font-size: 12px;
    }

    select, input {
      min-height: 36px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0 10px;
      background: white;
      color: var(--text);
      font: inherit;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      display: grid;
      gap: 10px;
      min-width: 0;
    }

    .card-head {
      display: flex;
      justify-content: space-between;
      align-items: start;
      gap: 8px;
    }

    .symbol {
      font-size: 22px;
      font-weight: 800;
      line-height: 1;
    }

    .date {
      color: var(--muted);
      font-size: 12px;
      text-align: right;
    }

    .price {
      font-size: 26px;
      font-weight: 800;
      line-height: 1;
    }

    .buy-row {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      gap: 8px;
      align-items: center;
    }

    .buy-row input {
      width: 100%;
      text-align: right;
      font-weight: 700;
    }

    canvas {
      width: 100%;
      height: 130px;
      display: block;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcfd;
    }

    .metrics {
      display: grid;
      gap: 6px;
      font-size: 13px;
    }

    .metric {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      color: var(--muted);
    }

    .metric strong {
      color: var(--text);
      text-align: right;
    }

    .up { color: var(--good) !important; }
    .down { color: var(--bad) !important; }

    .table-panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: auto;
      max-height: 360px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 720px;
      font-size: 13px;
    }

    th, td {
      padding: 8px 10px;
      border-bottom: 1px solid var(--line);
      text-align: right;
      white-space: nowrap;
    }

    th:first-child, td:first-child { text-align: left; }

    th {
      position: sticky;
      top: 0;
      z-index: 1;
      background: #edf2f7;
    }

    @media (max-width: 980px) {
      .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

    @media (max-width: 560px) {
      body { padding: 12px; }
      .grid { grid-template-columns: 1fr; }
      header { align-items: stretch; }
      .controls { display: grid; grid-template-columns: 1fr; }
      select { width: 100%; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>四檔美股收盤價追蹤</h1>
        <p class="sub">同時顯示 TSM、NVDA、AMD、AVGO；買入價存在你的瀏覽器，不需要 API key。</p>
      </div>
      <div class="controls">
        <label for="period">期間</label>
        <select id="period">
          <option value="1">近 1 個月</option>
          <option value="3">近 3 個月</option>
        </select>
      </div>
    </header>

    <div class="status">
      <span id="status">讀取資料中</span>
      <span id="updatedAt"></span>
    </div>

    <section class="grid" id="cards"></section>

    <section class="table-panel">
      <table>
        <thead>
          <tr>
            <th>股票</th>
            <th>日期</th>
            <th>最後收盤</th>
            <th>買入價</th>
            <th>價差</th>
            <th>報酬率</th>
            <th>區間高點</th>
            <th>區間低點</th>
          </tr>
        </thead>
        <tbody id="summaryRows"></tbody>
      </table>
    </section>
  </main>

  <script>
    const TARGET_SYMBOLS = ["TSM", "NVDA", "AMD", "AVGO"];
    const cardsEl = document.querySelector("#cards");
    const periodEl = document.querySelector("#period");
    const statusEl = document.querySelector("#status");
    const updatedAtEl = document.querySelector("#updatedAt");
    const summaryRowsEl = document.querySelector("#summaryRows");
    const storeKey = "stock-quote:buy-prices:v1";
    let priceData = null;

    function money(value) {
      if (!Number.isFinite(value)) return "--";
      return value.toLocaleString("en-US", { style: "currency", currency: "USD" });
    }

    function pct(value) {
      if (!Number.isFinite(value)) return "--";
      return `${value >= 0 ? "+" : ""}${value.toFixed(2)}%`;
    }

    function cls(value) {
      if (!Number.isFinite(value) || value === 0) return "";
      return value > 0 ? "up" : "down";
    }

    function loadBuyPrices() {
      try {
        return JSON.parse(localStorage.getItem(storeKey)) || {};
      } catch {
        return {};
      }
    }

    function saveBuyPrice(symbol, value) {
      const prices = loadBuyPrices();
      prices[symbol] = value;
      localStorage.setItem(storeKey, JSON.stringify(prices));
    }

    function cutoffDate(months) {
      const date = new Date();
      date.setMonth(date.getMonth() - Number(months || 1));
      return date.toISOString().slice(0, 10);
    }

    function rowsFor(symbol) {
      const allRows = priceData?.symbols?.[symbol]?.rows || [];
      const cutoff = cutoffDate(periodEl.value);
      return allRows.filter((row) => row.date >= cutoff);
    }

    async function loadData() {
      const response = await fetch(`data/prices.json?ts=${Date.now()}`, { cache: "no-store" });
      if (!response.ok) throw new Error(`無法讀取 data/prices.json (${response.status})`);
      priceData = await response.json();
      updatedAtEl.textContent = ` / 資料更新：${priceData.updatedAt ? new Date(priceData.updatedAt).toLocaleString("zh-TW", { hour12: false }) : "尚未更新"}`;
      render();
    }

    function render() {
      const buys = loadBuyPrices();
      cardsEl.innerHTML = TARGET_SYMBOLS.map((symbol) => cardTemplate(symbol, buys[symbol] || "")).join("");
      cardsEl.querySelectorAll("input[data-symbol]").forEach((input) => {
        input.addEventListener("input", () => {
          saveBuyPrice(input.dataset.symbol, Number(input.value || 0));
          render();
        });
      });
      TARGET_SYMBOLS.forEach(drawSymbolChart);
      renderSummary();
      statusEl.textContent = `顯示近 ${periodEl.value} 個月資料`;
    }

    function cardTemplate(symbol, buyValue) {
      const rows = rowsFor(symbol);
      const last = rows[rows.length - 1];
      const buy = Number(buyValue || 0);
      const diff = last && buy ? last.close - buy : NaN;
      const diffPct = last && buy ? diff / buy * 100 : NaN;
      return `
        <article class="card">
          <div class="card-head">
            <div class="symbol">${symbol}</div>
            <div class="date">${last?.date || "無資料"}</div>
          </div>
          <div class="price">${last ? money(last.close) : "--"}</div>
          <div class="buy-row">
            <label for="buy-${symbol}">買入價</label>
            <input id="buy-${symbol}" data-symbol="${symbol}" type="number" min="0" step="0.01" value="${buyValue}" placeholder="自訂">
          </div>
          <canvas id="chart-${symbol}" width="300" height="130"></canvas>
          <div class="metrics">
            <div class="metric"><span>價差</span><strong class="${cls(diff)}">${Number.isFinite(diff) ? `${diff >= 0 ? "+" : "-"}${money(Math.abs(diff))}` : "--"}</strong></div>
            <div class="metric"><span>報酬率</span><strong class="${cls(diffPct)}">${pct(diffPct)}</strong></div>
          </div>
        </article>
      `;
    }

    function drawSymbolChart(symbol) {
      const canvas = document.querySelector(`#chart-${symbol}`);
      const rows = rowsFor(symbol);
      if (!canvas || !rows.length) return;
      const buy = Number(loadBuyPrices()[symbol] || 0);
      const rect = canvas.getBoundingClientRect();
      const scale = window.devicePixelRatio || 1;
      canvas.width = Math.max(260, Math.floor(rect.width * scale));
      canvas.height = Math.floor(130 * scale);
      const ctx = canvas.getContext("2d");
      ctx.scale(scale, scale);
      const width = canvas.width / scale;
      const height = canvas.height / scale;
      const pad = { left: 42, right: 8, top: 10, bottom: 22 };
      const closes = rows.map((row) => Number(row.close));
      const values = buy > 0 ? closes.concat(buy) : closes;
      const min = Math.min(...values);
      const max = Math.max(...values);
      const span = max === min ? 1 : max - min;
      const x = (index) => pad.left + index / Math.max(1, rows.length - 1) * (width - pad.left - pad.right);
      const y = (value) => pad.top + (max - value) / span * (height - pad.top - pad.bottom);

      ctx.clearRect(0, 0, width, height);
      ctx.fillStyle = "#fbfcfd";
      ctx.fillRect(0, 0, width, height);
      ctx.strokeStyle = "#d8dee4";
      ctx.lineWidth = 1;
      ctx.fillStyle = "#667085";
      ctx.font = "10px -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif";

      [min, max].forEach((value) => {
        const yy = y(value);
        ctx.beginPath();
        ctx.moveTo(pad.left, yy);
        ctx.lineTo(width - pad.right, yy);
        ctx.stroke();
        ctx.fillText(money(value).replace(".00", ""), 5, yy + 3);
      });

      if (buy > 0) {
        ctx.strokeStyle = "#b45309";
        ctx.setLineDash([5, 4]);
        ctx.beginPath();
        ctx.moveTo(pad.left, y(buy));
        ctx.lineTo(width - pad.right, y(buy));
        ctx.stroke();
        ctx.setLineDash([]);
      }

      ctx.strokeStyle = "#2563eb";
      ctx.lineWidth = 2;
      ctx.beginPath();
      rows.forEach((row, index) => {
        if (index === 0) ctx.moveTo(x(index), y(row.close));
        else ctx.lineTo(x(index), y(row.close));
      });
      ctx.stroke();

      ctx.fillStyle = "#667085";
      ctx.fillText(rows[0].date.slice(5), pad.left, height - 7);
      ctx.fillText(rows[rows.length - 1].date.slice(5), width - 42, height - 7);
    }

    function renderSummary() {
      const buys = loadBuyPrices();
      summaryRowsEl.innerHTML = TARGET_SYMBOLS.map((symbol) => {
        const rows = rowsFor(symbol);
        const last = rows[rows.length - 1];
        const buy = Number(buys[symbol] || 0);
        const closes = rows.map((row) => row.close);
        const high = closes.length ? Math.max(...closes) : NaN;
        const low = closes.length ? Math.min(...closes) : NaN;
        const diff = last && buy ? last.close - buy : NaN;
        const diffPct = last && buy ? diff / buy * 100 : NaN;
        return `
          <tr>
            <td>${symbol}</td>
            <td>${last?.date || "--"}</td>
            <td>${last ? money(last.close) : "--"}</td>
            <td>${money(buy)}</td>
            <td class="${cls(diff)}">${Number.isFinite(diff) ? `${diff >= 0 ? "+" : "-"}${money(Math.abs(diff))}` : "--"}</td>
            <td class="${cls(diffPct)}">${pct(diffPct)}</td>
            <td>${money(high)}</td>
            <td>${money(low)}</td>
          </tr>
        `;
      }).join("");
    }

    periodEl.addEventListener("change", render);
    window.addEventListener("resize", render);

    loadData().catch((error) => {
      statusEl.textContent = error.message;
    });
  </script>
</body>
</html>
