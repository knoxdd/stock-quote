<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>美股近一個月收盤價</title>
  <style>
    :root {
      --bg: #f6f7f9;
      --panel: #fff;
      --text: #1f2937;
      --muted: #667085;
      --line: #d8dee4;
      --accent: #2563eb;
      --buy: #b45309;
      --good: #087443;
      --bad: #b42318;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif;
      padding: 22px 16px 36px;
    }

    main {
      width: min(980px, 100%);
      margin: 0 auto;
      display: grid;
      gap: 14px;
    }

    h1 {
      margin: 0;
      font-size: 26px;
      letter-spacing: 0;
    }

    .sub {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
    }

    .controls {
      display: grid;
      grid-template-columns: minmax(160px, 1fr) minmax(150px, 1fr) auto;
      gap: 10px;
      align-items: end;
    }

    label {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 6px;
    }

    select, input, button {
      width: 100%;
      min-height: 40px;
      border-radius: 8px;
      font: inherit;
    }

    select, input {
      border: 1px solid var(--line);
      padding: 0 10px;
      background: white;
      color: var(--text);
    }

    button {
      border: 1px solid var(--accent);
      background: var(--accent);
      color: white;
      padding: 0 14px;
      cursor: pointer;
      font-weight: 700;
      white-space: nowrap;
    }

    .summary {
      display: flex;
      gap: 12px;
      justify-content: space-between;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .chart-box {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcfd;
      padding: 10px;
    }

    canvas {
      width: 100%;
      height: 320px;
      display: block;
    }

    .table-wrap {
      max-height: 420px;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 560px;
      font-size: 13px;
    }

    th, td {
      padding: 9px 10px;
      border-bottom: 1px solid var(--line);
      text-align: right;
      white-space: nowrap;
    }

    th:first-child, td:first-child { text-align: left; }

    th {
      position: sticky;
      top: 0;
      background: #edf2f7;
      z-index: 1;
    }

    tr:last-child td { border-bottom: 0; }
    .up { color: var(--good); }
    .down { color: var(--bad); }
    .note { color: var(--muted); font-size: 12px; line-height: 1.5; }

    @media (max-width: 680px) {
      .controls { grid-template-columns: 1fr; }
      canvas { height: 260px; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>美股近一個月收盤價</h1>
      <p class="sub">GitHub Actions 每天更新資料；網頁只讀靜態 JSON，不需要 API key。</p>
    </header>

    <section class="panel controls">
      <div>
        <label for="symbol">股票</label>
        <select id="symbol"></select>
      </div>
      <div>
        <label for="buyPrice">買入價</label>
        <input id="buyPrice" type="number" min="0" step="0.01" placeholder="例如 200">
      </div>
      <div>
        <button id="drawBtn" type="button">顯示</button>
      </div>
    </section>

    <section class="panel summary">
      <span id="status">讀取資料中</span>
      <span id="updatedAt"></span>
    </section>

    <section class="panel chart-box">
      <canvas id="chart" width="900" height="320"></canvas>
    </section>

    <section class="panel table-wrap">
      <table>
        <thead>
          <tr>
            <th>日期</th>
            <th>收盤價</th>
            <th>買入價</th>
            <th>價差</th>
            <th>報酬率</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </section>

    <p class="note">要新增股票，修改 <code>data/stocks.json</code> 後到 GitHub Actions 手動執行一次「Update stock history」。</p>
  </main>

  <script>
    const symbolSelect = document.querySelector("#symbol");
    const buyPriceInput = document.querySelector("#buyPrice");
    const drawBtn = document.querySelector("#drawBtn");
    const statusEl = document.querySelector("#status");
    const updatedAtEl = document.querySelector("#updatedAt");
    const tbody = document.querySelector("#tbody");
    const chart = document.querySelector("#chart");
    let priceData = null;

    function money(value) {
      if (!Number.isFinite(value)) return "--";
      return value.toLocaleString("en-US", { style: "currency", currency: "USD" });
    }

    function pct(value) {
      if (!Number.isFinite(value)) return "--";
      return `${value >= 0 ? "+" : ""}${value.toFixed(2)}%`;
    }

    function localDateTime(value) {
      if (!value) return "尚未更新";
      return new Date(value).toLocaleString("zh-TW", { hour12: false });
    }

    async function loadData() {
      const response = await fetch(`data/prices.json?ts=${Date.now()}`, { cache: "no-store" });
      if (!response.ok) throw new Error(`無法讀取 data/prices.json (${response.status})`);
      priceData = await response.json();
      const symbols = Object.keys(priceData.symbols || {}).filter((symbol) => priceData.symbols[symbol]?.rows?.length);
      symbolSelect.innerHTML = symbols.map((symbol) => `<option value="${symbol}">${symbol}</option>`).join("");
      updatedAtEl.textContent = `資料更新：${localDateTime(priceData.updatedAt)}`;
      if (!symbols.length) {
        statusEl.textContent = "目前沒有可用資料，請先執行 GitHub Actions 更新。";
        return;
      }
      statusEl.textContent = "已載入資料";
      draw();
    }

    function selectedRows() {
      const symbol = symbolSelect.value;
      return priceData?.symbols?.[symbol]?.rows || [];
    }

    function draw() {
      const symbol = symbolSelect.value;
      const rows = selectedRows();
      const buy = Number(buyPriceInput.value || 0);
      if (!rows.length) {
        statusEl.textContent = `${symbol || "這支股票"} 沒有資料`;
        return;
      }
      const first = rows[0];
      const last = rows[rows.length - 1];
      const diff = buy ? last.close - buy : NaN;
      const diffPct = buy ? diff / buy * 100 : NaN;
      statusEl.textContent = `${symbol}：${first.date} 到 ${last.date}，最後收盤 ${money(last.close)}，相對買入價 ${money(buy)} 為 ${pct(diffPct)}`;
      drawChart(rows, buy);
      renderTable(rows, buy);
    }

    function drawChart(rows, buy) {
      const rect = chart.getBoundingClientRect();
      const scale = window.devicePixelRatio || 1;
      chart.width = Math.max(620, Math.floor(rect.width * scale));
      chart.height = Math.floor(320 * scale);
      const ctx = chart.getContext("2d");
      ctx.scale(scale, scale);
      const width = chart.width / scale;
      const height = chart.height / scale;
      const pad = { left: 58, right: 18, top: 18, bottom: 38 };
      const closes = rows.map((row) => Number(row.close));
      const values = buy > 0 ? closes.concat(buy) : closes;
      const min = Math.min(...values);
      const max = Math.max(...values);
      const span = max === min ? 1 : max - min;
      const x = (index) => pad.left + index / Math.max(1, rows.length - 1) * (width - pad.left - pad.right);
      const y = (value) => pad.top + (max - value) / span * (height - pad.top - pad.bottom);

      ctx.clearRect(0, 0, width, height);
      ctx.fillStyle = "#fbfcfd";
      ctx.fillRect(0, 0, width, height);
      ctx.strokeStyle = "#d8dee4";
      ctx.lineWidth = 1;
      ctx.fillStyle = "#667085";
      ctx.font = "12px -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif";

      for (let i = 0; i <= 4; i += 1) {
        const value = min + span * i / 4;
        const yy = y(value);
        ctx.beginPath();
        ctx.moveTo(pad.left, yy);
        ctx.lineTo(width - pad.right, yy);
        ctx.stroke();
        ctx.fillText(money(value), 6, yy + 4);
      }

      if (buy > 0) {
        const buyY = y(buy);
        ctx.strokeStyle = "#b45309";
        ctx.setLineDash([6, 5]);
        ctx.beginPath();
        ctx.moveTo(pad.left, buyY);
        ctx.lineTo(width - pad.right, buyY);
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.fillStyle = "#b45309";
        ctx.fillText(`買入 ${money(buy)}`, pad.left + 8, buyY - 7);
      }

      ctx.strokeStyle = "#2563eb";
      ctx.lineWidth = 2;
      ctx.beginPath();
      rows.forEach((row, index) => {
        if (index === 0) ctx.moveTo(x(index), y(row.close));
        else ctx.lineTo(x(index), y(row.close));
      });
      ctx.stroke();

      ctx.fillStyle = "#2563eb";
      [0, Math.floor((rows.length - 1) / 2), rows.length - 1].forEach((index) => {
        const row = rows[index];
        if (!row) return;
        ctx.beginPath();
        ctx.arc(x(index), y(row.close), 3, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "#667085";
        ctx.fillText(row.date.slice(5), x(index) - 18, height - 12);
        ctx.fillStyle = "#2563eb";
      });
    }

    function renderTable(rows, buy) {
      tbody.innerHTML = rows.slice().reverse().map((row) => {
        const diff = buy ? row.close - buy : NaN;
        const diffPct = buy ? diff / buy * 100 : NaN;
        const cls = diff > 0 ? "up" : diff < 0 ? "down" : "";
        return `
          <tr>
            <td>${row.date}</td>
            <td>${money(row.close)}</td>
            <td>${money(buy)}</td>
            <td class="${cls}">${Number.isFinite(diff) ? `${diff >= 0 ? "+" : "-"}${money(Math.abs(diff))}` : "--"}</td>
            <td class="${cls}">${pct(diffPct)}</td>
          </tr>
        `;
      }).join("");
    }

    drawBtn.addEventListener("click", draw);
    symbolSelect.addEventListener("change", draw);
    buyPriceInput.addEventListener("change", draw);
    window.addEventListener("resize", draw);

    loadData().catch((error) => {
      statusEl.textContent = error.message;
    });
  </script>
</body>
</html>
